<ul id="task-list">
  {{ $active := .Active.ID }}
  {{ range .Tasks }}
  <li class="{{ if .Done }}done{{ end }}">
    <input type="checkbox" {{ if .Done }}checked{{ end }}
      hx-post="/tasks/{{ .ID }}/toggle?project={{ $active }}" hx-target="#task-list" hx-swap="outerHTML"
      aria-label="Toggle done">
    <span>{{ .Title }}</span>
    <button class="del" hx-delete="/tasks/{{ .ID }}?project={{ $active }}" hx-target="#task-list" hx-swap="outerHTML"
      hx-confirm="Delete this task?" aria-label="Delete task">✕</button>
  </li>
  {{ else }}
  <li class="empty-row"><span class="empty"><strong>No tasks yet</strong>Add your first task in the composer above.</span></li>
  {{ end }}
</ul>
<div class="quick-create-wrap">
  <form class="quick-create-form" hx-post="/tasks/quick-create" hx-target="#task-list" hx-swap="outerHTML"
        hx-on::after-request="if(event.detail.successful) quickCreateSuccess(this)">
    <input type="text" name="title" placeholder="Quick add…" aria-label="Quick add task" autocomplete="off">
    <button type="submit">Add</button>
  </form>
</div>
