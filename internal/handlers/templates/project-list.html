<ul id="task-list">
  {{ $active := .Active.ID }}
  {{ range .Tasks }}
  <li class="{{ if .Done }}done{{ end }}">
    <input type="checkbox" class="task-select" data-task-id="{{ .ID }}"
      aria-label="Select task for bulk operations">
    <input type="checkbox" {{ if .Done }}checked{{ end }}
      hx-post="/tasks/{{ .ID }}/toggle?project={{ $active }}" hx-target="#task-list" hx-swap="outerHTML"
      aria-label="Toggle done">
    <span>{{ .Title }}</span>
    <button class="del" hx-delete="/tasks/{{ .ID }}?project={{ $active }}" hx-target="#task-list" hx-swap="outerHTML"
      hx-confirm="Delete this task?" aria-label="Delete task">✕</button>
  </li>
  {{ else }}
  <li class="empty-row"><span class="empty"><strong>No tasks yet</strong>Add your first task in the composer above.</span></li>
  {{ end }}
</ul>

<!-- Bulk action toolbar (shown when ≥1 task selected) -->
<div class="bulk-toolbar" style="display: none;">
  <span id="bulk-count">0 tasks selected</span>
  <button data-action="mark-done">Mark Done</button>
  <button data-action="delete">Delete Selected</button>
  <select name="priority">
    <option value="">Change Priority...</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
</div>
