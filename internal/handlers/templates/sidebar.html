<aside id="sidebar">
  <h2>Projects</h2>
  <div class="search-box-wrap">
    <input type="text" id="search-box" placeholder="Search tasks..." aria-label="Search tasks">
    <span id="search-result-count" class="search-result-count" style="display: none;"></span>
  </div>
  <ul class="project-list">
    {{ $active := .Active.ID }}
    {{ range .Projects }}
    <li class="{{ if eq .ID $active }}active{{ end }}">
      <a href="/projects/{{ .ID }}"
         hx-get="/projects/{{ .ID }}" hx-target="#main" hx-swap="outerHTML" hx-push-url="false">{{ .Name }}</a>
    </li>
    {{ end }}
  </ul>
  <form class="new-project" hx-post="/projects" hx-target="#sidebar" hx-swap="outerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="text" name="name" placeholder="New project" aria-label="New project name" required>
    <button type="submit">+</button>
  </form>
</aside>
