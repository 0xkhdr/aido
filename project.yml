# specd project configuration — operator-owned, not a managed region.
# `specd init` writes this once and never clobbers your edits. Syntax is a
# strict subset of YAML: two-space indent, `key: value`, `#` comments.
#
# Posture: maximum enforcement. Orchestration armed, lifecycle profile
# production, every scanner on. Downgrade knobs are named inline.

# Identity of the harness that runs the workers. Must be `claude` or `codex`
# while orchestration is enabled — `specd agents doctor` fails closed if the
# matching .claude/agents/pinky-*.md (or .codex) worker set is missing.
agent: claude

# Lifecycle strictness profile. default|production.
#   default    — every completeness gate stays opt-in.
#   production — arms criterion, review, and integration/negative-path evidence
#                gates together, regardless of the switches below.
# Downgrade: set `profile: default` (one line) if per-criterion evidence is too
# heavy for early greenfield waves.
profile: production

# Bound each task verify command in wall-clock seconds. A timeout is recorded as
# a FAILING evidence record (exit 124), never a silent hang. 0 means unbounded.
verify:
  timeout_seconds: 600

gates:
  verify: error

escalation:
  max_verify_fails: 3

# Deterministic orchestration controller (`specd brain`). Required true before
# brain will start; dispatch still needs an explicit `--authority` per run.
orchestration:
  enabled: true
  model: ""

# Bounded context manifest per task. Raise only if manifests get truncated.
context:
  max_tokens: 12000

# Provider-neutral routing. Core chooses a capability class only; adapters map
# it to a provider/model. Zero limits are unbounded.
routing:
  version: 1
  classes: standard,reasoning,deep
  default_class: standard
  fallback: standard,reasoning,deep
  class_capabilities: standard=context+eval;reasoning=context+eval+review;deep=context+eval+review+sandbox
  recommendations: low=standard,medium=standard,high=reasoning
  max_tokens: 0
  max_cost_micros: 0
  deadline_seconds: 0
  max_retries: 3
  allow_unknown_telemetry: false

# Scanners. `profile: production` here additionally makes sandboxed verify
# mandatory — leave it `prototype` until the host actually isolates execution.
security:
  profile: prototype
  secrets: error
  injection: error
  slopsquat: warn
  clean_worktree: warn
  sandbox: off

# Explicit even though `profile: production` already arms both — the intent
# should survive a profile downgrade.
criteria:
  required: true

review:
  required: true

# Closed delivery policy per environment. Unused — aido ships no environments
# yet. Each name is a closed set member (development|staging|production); an
# unknown name or a missing/invalid required field fails closed at load.
# environments:
#   staging: strategy=rolling;criteria=health;window=5m;freshness=2m;rollback=previous
#   production: strategy=canary;approver=release-manager;authority=oncall;criteria=health+latency;window=10m;freshness=5m;rollback=previous
